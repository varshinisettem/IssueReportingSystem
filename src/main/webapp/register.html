<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 0;
}

/* Center container */
.container {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card box */
.box {
    width: 400px;
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

/* Title */
.box h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Table styling */
table {
    width: 100%;
    margin-top: 10px;
}

td {
    padding: 8px;
    text-align: left;
    color: #444;
    font-weight: 500;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
    box-shadow: 0 0 5px rgba(102,126,234,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

/* Link */
a {
    display: block;
    margin-top: 15px;
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
}

a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="container">
<div class="box">

<h2>Create Account</h2>

<form action="RegisterServlet" method="post">

<table>

<tr>
<td>Full Name</td>
</tr>
<tr>
<td><input type="text" name="name" placeholder="Enter your name" required></td>
</tr>

<tr>
<td>Email</td>
</tr>
<tr>
<td><input type="email" name="email" placeholder="Enter your email" required></td>
</tr>

<tr>
<td>Password</td>
</tr>
<tr>
<td><input type="password" name="password" placeholder="Enter password" required></td>
</tr>

</table>

<button type="submit">Register</button>

</form>

<a href="login.html">Already have an account? Login</a>

</div>
</div>

</body>
</html>
